services:
  api-tareas:
    image: api-tareas:latest
    container_name: api-tareas
    restart: unless-stopped
    ports:
      - "30001:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tareas-spring.rule=Host(`api-tareas.deviaaps.com`)"
      - "traefik.http.routers.tareas-spring.entrypoints=websecure"
      - "traefik.http.routers.tareas-spring.tls=true"
      - "traefik.http.routers.tareas-spring.tls.certresolver=cloudflare"
      - "traefik.http.services.tareas-spring-svc.loadbalancer.server.port=8080"
    networks:
      - miseia-net

networks:
  miseia-net:
    external: true
